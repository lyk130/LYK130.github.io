<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙雨琨的个人空间</title>
    <style>
        /* 炫酷的科技风背景 */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #0ff; /* 青色文字 */
            font-family: "Courier New", Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 顶部栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 255, 255, 0.1);
            border-bottom: 1px solid #0ff;
        }

        .home-btn {
            color: #0ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            text-shadow: 0 0 5px #0ff;
        }

        /* 内容卡片 */
        .content-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #0ff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;
            max-width: 80%;
            animation: glow 2s infinite alternate;
        }

        h1 { margin-top: 0; font-size: 3em; text-shadow: 0 0 10px #0ff; }
        p { font-size: 1.5em; line-height: 1.6; }

        /* 首页按钮样式 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 80%;
            max-width: 800px;
        }

        .card {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: #0ff;
        }
        .card:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
            transform: scale(1.05);
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px #0ff; }
            to { box-shadow: 0 0 30px #0ff, 0 0 10px #0ff; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div class="top-bar">
        <div id="clock">时间加载中...</div>
        <a href="index.html" class="home-btn">个人中心 (首页)</a>
    </div>

    <!-- 中间主要内容（这里是会被修改的地方） -->
    <div class="content-box">
        <!-- 这里的内容会在不同页面变化 -->
        <h1 id="main-title">标题</h1>
        <p id="main-text">内容</p>
    </div>

    <script>
        // 时间脚本
        function updateClock() {
            const now = new Date();
            // 公历
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            // 农历 (简单模拟，精确农历需要复杂库，这里用系统自带接口)
            // 注意：浏览器原生不支持直接转农历，这里显示公历+星期，或者你可以手动改
            const weekDay = ["日", "一", "二", "三", "四", "五", "六"];
            const week = weekDay[now.getDay()];

            document.getElementById('clock').innerHTML = 
                `公历: ${year}-${month}-${day} ${hours}:${minutes} (周${week})`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
