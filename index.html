<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYK130 | 赛博空间</title>
    <style>
        /* --- 基础重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- 赛博背景 --- */
        body {
            background-color: #050505;
            /* 创建网格背景 */
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            /* 背景透视感 */
            perspective: 500px;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            height: 100vh;
            overflow: hidden; /* 防止滚动条 */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 装饰性扫描线 --- */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.05) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            animation: scan 4s linear infinite;
        }

        /* --- 主容器 --- */
        .cyber-container {
            position: relative;
            z-index: 2;
            text-align: center;
            border: 1px solid #0ff;
            padding: 40px 60px;
            background: rgba(0, 10, 20, 0.85);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            clip-path: polygon(
                20px 0, 100% 0,
                100% calc(100% - 20px), calc(100% - 20px) 100%,
                0 100%, 0 20px
            );
            max-width: 600px;
            width: 90%;
        }

        /* --- 故障文字效果 --- */
        .glitch-title {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff;
            animation: glitch 1s infinite alternate;
        }

        /* --- 描述文字 --- */
        .subtitle {
            color: #0ff;
            font-size: 1rem;
            margin-bottom: 40px;
            border-bottom: 1px dashed #0ff;
            padding-bottom: 20px;
            display: inline-block;
            opacity: 0.8;
        }

        /* --- 霓虹按钮组 --- */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .cyber-btn {
            text-decoration: none;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 30px;
            border: 1px solid #ff00ff;
            background: transparent;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 200px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        /* 按钮悬停特效 */
        .cyber-btn:hover {
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            color: #000;
            text-shadow: none;
            transform: scale(1.05);
        }

        .cyber-btn:nth-child(2) {
            border-color: #0ff;
            color: #0ff;
        }

        .cyber-btn:nth-child(2):hover {
            background: #0ff;
            box-shadow: 0 0 20px #0ff;
            color: #000;
        }

        /* --- 动画定义 --- */
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff; transform: skew(0deg); }
            20% { text-shadow: -2px 2px #ff00ff, 2px 2px #00ffff; transform: skew(10deg); }
            40% { text-shadow: 2px -2px #ff00ff, -2px -2px #00ffff; transform: skew(-10deg); }
            60% { text-shadow: -2px -2px #ff00ff, 2px 2px #00ffff; transform: skew(0deg); }
            100% { text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff; transform: skew(0deg); }
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .glitch-title { font-size: 2rem; }
            .cyber-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="cyber-container">
        <h1 class="glitch-title">LYK130</h1>
        <p class="subtitle">SYSTEM ONLINE // WELCOME TO MY DOMAIN</p>

        <div class="btn-group">
            <!-- 这里的 href 对应你创建的其他文件名 -->
            <a href="profile.html" class="cyber-btn">进入个人档案</a>
            <a href="project.html" class="cyber-btn">查看项目数据</a>
            <a href="blog.html" class="cyber-btn">访问日志库</a>
        </div>
    </div>

</body>
</html>
